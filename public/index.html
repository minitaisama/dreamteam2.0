<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dreamteam At Work</title>
  <meta name="description" content="A lightweight live dashboard for the Dreamteam — pixel scene, agent status, and activity feed." />
  <meta name="theme-color" content="#0a0a0f" />

  <!-- Open Graph -->
  <meta property="og:title" content="Dreamteam At Work" />
  <meta property="og:description" content="Live status + pixel scene + activity feed for the Dreamteam." />
  <meta property="og:image" content="https://dreamteam20.vercel.app/apple-touch-icon.png" />
  <meta property="og:url" content="https://dreamteam20.vercel.app/" />
  <meta property="og:type" content="website" />

  <!-- Icons -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <!-- Pixel font for dialog box + UI accents -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <!-- Phaser 3 (CDN, no build) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <link rel="stylesheet" href="/sprites.css" />

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;

      --text: #e8e8ec;
      --text2: #b8b8c4;
      --text3: #8b8b99;

      --accent: #8b5cf6;
      --accent2: #6d28d9;

      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
      --ceo: #f59e0b;

      --radius: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(18,18,26,0.75);
      border-radius: 14px;
      margin-bottom: 1rem;
      box-shadow: 0 18px 55px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
    }

    .tab {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(232,232,236,0.85);
      font-weight: 760;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      border-color: rgba(196,181,253,0.45);
      background: rgba(139,92,246,0.10);
    }

    .tab.active {
      background: linear-gradient(135deg, rgba(139,92,246,0.35), rgba(245,158,11,0.15));
      border-color: rgba(196,181,253,0.55);
      color: #f5f3ff;
      box-shadow: 0 10px 30px rgba(109,40,217,0.22);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .retro-frame {
      width: 100%;
      height: 980px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      background: #0a0a0f;
      box-shadow: 0 18px 60px rgba(0,0,0,0.32);
    }

    @media (max-width: 760px) {
      .retro-frame { height: 1200px; }
      .tabs { position: sticky; top: 10px; z-index: 20; }
    }

    a { color: #c4b5fd; text-decoration: none; }
    a:hover { color: #ddd6fe; text-decoration: underline; }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.35rem;
      padding-bottom: 1.15rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      min-width: 0;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.18);
      object-fit: cover;
      flex: 0 0 auto;
    }

    .brand-title {
      font-size: 1.85rem;
      font-weight: 820;
      line-height: 1.12;
      background: linear-gradient(135deg, var(--accent), var(--ceo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .brand-sub {
      margin-top: 0.2rem;
      font-size: 0.9rem;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 62ch;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      border-radius: 9999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--text2);
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .pill strong { color: #fff; font-weight: 780; }

    .pill.demo {
      background: rgba(245,158,11,0.10);
      border-color: rgba(245,158,11,0.30);
      color: #fde68a;
      display: none;
    }

    .muted { color: var(--text3); }

    /* KPI strip */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.9rem;
      margin: 1.0rem 0 1.25rem;
    }

    .kpi-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 1.05rem 1.15rem;
    }

    .kpi-label {
      font-size: 0.72rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .kpi-value {
      font-size: 1.55rem;
      font-weight: 850;
      margin-top: 0.25rem;
      color: #fff;
    }

    .kpi-hint {
      margin-top: 0.1rem;
      font-size: 0.8rem;
      color: var(--text2);
    }

    /* Agent strip */
    .agents-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.9rem;
      margin-bottom: 1.25rem;
    }

    .agent-mini {
      background: rgba(18,18,26,0.75);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius);
      padding: 0.9rem 0.95rem;
      min-height: 94px;
    }

    .agent-mini-top {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.35rem;
    }

    .agent-mini-name {
      font-weight: 800;
      display: flex;
      gap: 0.55rem;
      align-items: center;
      flex-wrap: wrap;
      line-height: 1.2;
    }

    .badge {
      font-size: 0.72rem;
      padding: 0.18rem 0.55rem;
      border-radius: 9999px;
      font-weight: 750;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .badge-ceo { background: rgba(245,158,11,0.12); color: #fde68a; }
    .badge-pm { background: rgba(59,130,246,0.12); color: #bfdbfe; }
    .badge-dev { background: rgba(34,197,94,0.12); color: #bbf7d0; }
    .badge-qa { background: rgba(234,179,8,0.12); color: #fef08a; }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(0,0,0,0.35);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.03);
      flex: 0 0 auto;
    }

    .status-working { background: var(--green); box-shadow: 0 0 0 3px rgba(34,197,94,0.12); }
    .status-idle { background: #94a3b8; box-shadow: 0 0 0 3px rgba(148,163,184,0.10); }
    .status-sleeping { background: #60a5fa; box-shadow: 0 0 0 3px rgba(96,165,250,0.10); }
    .status-eating { background: var(--yellow); box-shadow: 0 0 0 3px rgba(234,179,8,0.12); }

    .agent-mini-task {
      font-size: 0.85rem;
      color: var(--text2);
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .agent-mini-task .none { color: var(--text3); }

    .typing {
      margin-top: 0.45rem;
      display: none;
      gap: 0.35rem;
      align-items: center;
      color: var(--text3);
      font-size: 0.78rem;
    }

    .typing .dots { display: inline-flex; gap: 0.25rem; }
    .typing .dots span {
      width: 4px; height: 4px; border-radius: 99px;
      background: rgba(255,255,255,0.28);
      animation: dotPulse 1.1s infinite;
    }
    .typing .dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing .dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotPulse {
      0%, 100% { transform: translateY(0); opacity: 0.55; }
      50% { transform: translateY(-2px); opacity: 1; }
    }

    /* Layout */
    .grid-main {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 1.1rem;
      align-items: start;
      margin-bottom: 1.4rem;
    }

    /* Activity feed */
    .feed-card {
      background: rgba(18,18,26,0.75);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 320px;
      max-height: 420px;
    }

    .feed-header {
      padding: 0.95rem 1.05rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }

    .feed-header h2 {
      font-size: 0.95rem;
      font-weight: 820;
      letter-spacing: 0.01em;
    }

    .feed-actions { display: flex; gap: 0.5rem; align-items: center; }

    .btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--text);
      padding: 0.35rem 0.65rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.82rem;
    }
    .btn:hover { border-color: rgba(196,181,253,0.55); color: #ddd6fe; }

    .feed-body {
      padding: 0.95rem 0.95rem 0.6rem;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      scroll-behavior: smooth;
    }

    .msg {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 0.6rem;
      align-items: start;
      animation: popIn 0.18s ease-out;
    }

    @keyframes popIn {
      from { transform: translateY(3px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .msg.right {
      grid-template-columns: 1fr 28px;
    }

    .avatar {
      width: 28px; height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      display: grid;
      place-items: center;
      font-weight: 850;
      font-size: 0.72rem;
      color: #fff;
      overflow: hidden;
    }

    .bubble {
      border-radius: 14px;
      padding: 0.65rem 0.75rem;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
    }

    .bubble .meta {
      display: flex;
      gap: 0.55rem;
      align-items: center;
      margin-bottom: 0.25rem;
      color: var(--text3);
      font-size: 0.75rem;
    }

    .bubble .meta .name {
      font-weight: 860;
      color: #fff;
    }

    .bubble .meta .badge {
      font-size: 0.66rem;
      padding: 0.12rem 0.45rem;
      opacity: 0.92;
    }

    .bubble .meta span:last-child { margin-left: auto; }

    .bubble .text {
      color: var(--text2);
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.right .bubble { background: rgba(245,158,11,0.10); border-color: rgba(245,158,11,0.22); }

    /* per-agent accents */
    .accent-ceo .avatar { background: rgba(245,158,11,0.16); }
    .accent-pm .avatar { background: rgba(59,130,246,0.16); }
    .accent-dev .avatar { background: rgba(34,197,94,0.16); }
    .accent-qa .avatar { background: rgba(234,179,8,0.16); }

    .accent-ceo .bubble { border-color: rgba(245,158,11,0.22); }
    .accent-pm .bubble { border-color: rgba(59,130,246,0.22); }
    .accent-dev .bubble { border-color: rgba(34,197,94,0.20); }
    .accent-qa .bubble { border-color: rgba(234,179,8,0.22); }

    /* Charts */
    .charts-section { margin-top: 1.25rem; }

    .section-title {
      font-size: 1rem;
      font-weight: 750;
      color: var(--text);
      margin-bottom: 0.9rem;
      padding-left: 0.85rem;
      border-left: 3px solid var(--accent);
      letter-spacing: 0.01em;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 1.05rem;
    }

    .chart-card {
      background: rgba(18,18,26,0.75);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    .chart-card h3 { font-size: 0.95rem; margin-bottom: 1rem; color: var(--text2); }
    .chart-card canvas { max-height: 250px; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem 0;
      color: var(--text3);
      font-size: 0.82rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin-top: 2.0rem;
    }

    .footer .links { margin-top: 0.6rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .footer .sep { color: rgba(255,255,255,0.18); }

    /* Responsive */
    @media (max-width: 980px) {
      .agents-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid-main { grid-template-columns: 1fr; }
      .feed-card { max-height: 520px; }
    }

    @media (max-width: 560px) {
      .container { padding: 1rem; }
      .header { flex-direction: column; align-items: flex-start; gap: 0.9rem; }
      .header-right { width: 100%; justify-content: space-between; }
      .agents-strip { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="container">
    <header class="header">
      <div class="brand">
        <img class="brand-logo" src="/penguin.jpg" alt="Dreamteam" width="34" height="34" />
        <div>
          <h1 class="brand-title">🎮 Dreamteam At Work</h1>
          <div class="brand-sub">minitaisama/dreamteam2.0 · live dashboard</div>
        </div>
      </div>

      <div class="header-right">
        <span class="pill" id="agentCountPill">Agents: <strong id="agentCount">4</strong></span>
        <span class="pill" id="last-updated">Live: loading…</span>
        <span class="pill demo" id="demoBadge">DEMO MODE</span>
      </div>
    </header>

    <main>
      <!-- Tabs -->
      <nav class="tabs" aria-label="Dashboard tabs">
        <button class="tab active" type="button" data-tab="atwork" aria-controls="tab-atwork" aria-selected="true">🎮 At Work</button>
        <button class="tab" type="button" data-tab="retro" aria-controls="tab-retro" aria-selected="false">📊 Retro</button>
      </nav>

      <section id="tab-atwork" class="tab-panel active" aria-label="At Work tab">
        <section aria-label="Agent status strip">
          <div class="agents-strip" id="agentsStrip"></div>
        </section>

        <section aria-label="KPIs">
          <div class="kpi-grid" id="kpiGrid"></div>
        </section>

        <section class="grid-main" aria-label="Pixel scene and activity feed">
          <div>
            <div class="section-title">Pixel scene</div>

            <!-- Phaser mount (replaces CSS prototype scene) -->
            <div class="phaser-shell" aria-label="Dreamteam Phaser pixel scene">
              <div class="phaser-overlay" id="phaserOverlay" aria-hidden="true">
                <div class="phaser-loading">
                  <div class="bar"><div class="fill" id="phaserFill"></div></div>
                  <div class="txt">Loading pixel scene…</div>
                </div>
              </div>
              <div id="phaserMount" class="phaser-mount"></div>
            </div>
          </div>

          <div class="feed-card" aria-label="Activity feed">
            <div class="feed-header">
              <h2>Activity Feed</h2>
              <div class="feed-actions">
                <button class="btn" id="showMoreBtn" type="button">Show more</button>
              </div>
            </div>
            <div class="feed-body" id="feedBody"></div>
          </div>
        </section>
      </section>

      <section id="tab-retro" class="tab-panel" aria-label="Retro tab">
        <iframe class="retro-frame" title="Dream Team Retro Dashboard" src="/retro.html" loading="lazy"></iframe>
      </section>

      <section class="charts-section" aria-labelledby="chartsTitle">
        <h2 id="chartsTitle" class="section-title">Charts</h2>
        <div class="charts-grid">
          <div class="chart-card">
            <h3>Velocity Trend</h3>
            <canvas id="velocityChart"></canvas>
          </div>
          <div class="chart-card">
            <h3>Quality Score</h3>
            <canvas id="qualityChart"></canvas>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div>Dreamteam At Work · MiniSama (CEO) · Coach (PM) · Lebron (Dev) · Curry (QA)</div>
      <div class="links">
        <a href="https://github.com/minitaisama/dreamteam2.0" target="_blank" rel="noreferrer">GitHub</a>
        <span class="sep">·</span>
        <a href="/PLAYBOOK.md" target="_blank" rel="noreferrer">Playbook</a>
      </div>
    </footer>
  </div>

  <!-- Live layer (polling) -->
  <script src="/app.js?v=20260319-2"></script>
  <!-- Phaser pixel scene -->
  <script src="/phaser-atwork.js?v=20260319-2"></script>

  <script>
    // --------- UI helpers ---------
    const MAX_VISIBLE_DEFAULT = 30;
    let visibleCount = MAX_VISIBLE_DEFAULT;
    const seenFeedIds = new Set();

    function fmtTime(ts) {
      if (!ts) return '';
      const d = new Date(ts * 1000);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function normalizeAgentKey(s) {
      const t = (s || '').toString().toLowerCase();
      if (t.includes('mini')) return 'minisama';
      if (t.includes('coach')) return 'coach';
      if (t.includes('lebron')) return 'lebron';
      if (t.includes('curry')) return 'curry';
      // fallback: best-effort first token
      return t.split(/\s|\(/)[0] || 'coach';
    }

    function accentFor(key) {
      if (key === 'minisama') return 'accent-ceo';
      if (key === 'coach') return 'accent-pm';
      if (key === 'lebron') return 'accent-dev';
      if (key === 'curry') return 'accent-qa';
      return 'accent-pm';
    }

    function initialsFor(key) {
      if (key === 'minisama') return 'CEO';
      if (key === 'coach') return 'PM';
      if (key === 'lebron') return 'DEV';
      if (key === 'curry') return 'QA';
      return (key || '?').slice(0, 2).toUpperCase();
    }

    function statusClass(state) {
      const st = (state || 'idle').toLowerCase();
      if (st === 'working') return 'status-working';
      if (st === 'sleeping') return 'status-sleeping';
      if (st === 'eating') return 'status-eating';
      return 'status-idle';
    }

    function safeTask(t) {
      if (!t) return '<span class="none">No active task</span>';
      return t;
    }

    function renderAgentsStrip(agents) {
      const strip = document.getElementById('agentsStrip');
      const agentCount = Object.keys(agents || {}).length;
      document.getElementById('agentCount').textContent = agentCount || 4;

      const roleMap = {
        minisama: { role: 'CEO', badge: 'badge-ceo' },
        coach: { role: 'PM', badge: 'badge-pm' },
        lebron: { role: 'Dev', badge: 'badge-dev' },
        curry: { role: 'QA', badge: 'badge-qa' }
      };

      const order = ['minisama', 'coach', 'lebron', 'curry'];
      strip.innerHTML = order.map(key => {
        const a = agents?.[key] || { state: 'idle', task: null };
        const meta = roleMap[key];
        const showTyping = (a.state === 'working');
        return `
          <div class="agent-mini">
            <div class="agent-mini-top">
              <div class="agent-mini-name">
                <span class="status-dot ${statusClass(a.state)}" aria-hidden="true"></span>
                ${key === 'minisama' ? 'MiniSama' : key.charAt(0).toUpperCase() + key.slice(1)}
                <span class="badge ${meta.badge}">${meta.role}</span>
              </div>
              <div class="muted" style="font-size:0.78rem">${(a.state || 'idle').toUpperCase()}</div>
            </div>
            <div class="agent-mini-task">${safeTask(a.task)}</div>
            <div class="typing" style="display:${showTyping ? 'flex' : 'none'}">
              <span class="dots"><span></span><span></span><span></span></span>
              <span>typing…</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function calcKPIs(live) {
      const agents = live?.agents || {};
      const feed = live?.feed || [];
      const activeAgents = Object.values(agents).filter(a => a?.state === 'working').length;

      // heuristic: tasks this week ~ count non-null tasks
      const tasksThisWeek = Object.values(agents).filter(a => a?.task).length;

      // heuristic quality score: if Curry has task mentioning quality, bump; else default 8.6 demo-ish
      let qualityScore = 8.6;
      if (agents.curry?.task && /audit|quality|test/i.test(agents.curry.task)) qualityScore = 9.1;
      if (agents.lebron?.task && /bug|fix/i.test(agents.lebron.task)) qualityScore = 8.8;

      return {
        tasksThisWeek,
        qualityScore,
        activeAgents,
        feedMessages: feed.length
      };
    }

    function renderKPIGrid(kpis) {
      const el = document.getElementById('kpiGrid');
      el.innerHTML = `
        <div class="kpi-card">
          <div class="kpi-label">Tasks This Week</div>
          <div class="kpi-value">${kpis.tasksThisWeek}</div>
          <div class="kpi-hint">active tasks across agents</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Quality Score</div>
          <div class="kpi-value">${kpis.qualityScore.toFixed(1)}<span style="font-size:0.95rem;color:var(--text2);font-weight:750">/10</span></div>
          <div class="kpi-hint">rolling confidence</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Active Agents</div>
          <div class="kpi-value">${kpis.activeAgents}<span style="font-size:0.95rem;color:var(--text2);font-weight:750">/4</span></div>
          <div class="kpi-hint">currently working</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Feed Messages</div>
          <div class="kpi-value">${kpis.feedMessages}</div>
          <div class="kpi-hint">last ~100 stored</div>
        </div>
      `;
    }

    function renderFeed(feed, { reset = false } = {}) {
      const body = document.getElementById('feedBody');
      if (reset) {
        body.innerHTML = '';
        seenFeedIds.clear();
      }

      const msgs = (feed || []).slice(-visibleCount);
      const frag = document.createDocumentFragment();

      for (const m of msgs) {
        const id = m.id || `${m.ts}-${m.from}-${m.text}`;
        if (seenFeedIds.has(id)) continue;
        seenFeedIds.add(id);

        const fromKey = normalizeAgentKey(m.from);
        const right = fromKey === 'minisama';

        const wrap = document.createElement('div');
        wrap.className = `msg ${right ? 'right' : ''} ${accentFor(fromKey)}`;

        const roleBadge = m.kind ? `<span class="badge">${m.kind}</span>` : '';

        wrap.innerHTML = right ? `
          <div class="bubble">
            <div class="meta"><span class="name">${m.from || 'Unknown'}</span>${roleBadge}<span>${fmtTime(m.ts)}</span></div>
            <div class="text">${m.text || ''}</div>
          </div>
          <div class="avatar" aria-hidden="true">${initialsFor(fromKey)}</div>
        ` : `
          <div class="avatar" aria-hidden="true">${initialsFor(fromKey)}</div>
          <div class="bubble">
            <div class="meta"><span class="name">${m.from || 'Unknown'}</span>${roleBadge}<span>${fmtTime(m.ts)}</span></div>
            <div class="text">${m.text || ''}</div>
          </div>
        `;

        frag.appendChild(wrap);
      }

      body.appendChild(frag);
      // auto-scroll to latest
      body.scrollTop = body.scrollHeight;
    }

    function resetAndRenderAll(live) {
      renderAgentsStrip(live?.agents || {});
      renderKPIGrid(calcKPIs(live));
      // Phaser scene listens to dreamteam:live events directly (from app.js polling layer).
      renderFeed(live?.feed || [], { reset: true });

      // demo badge
      const src = window.DreamteamLive?.getState?.().source;
      document.getElementById('demoBadge').style.display = (src === 'demo') ? 'inline-flex' : 'none';
    }

    // --------- charts (kept from retro dashboard, now fed from weeks data) ---------
    const WEEKS = [];

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
      return await res.json();
    }

    async function loadWeeksIndex() {
      try {
        const basePath = window.location.pathname.includes('/weeks') ? '../..' : '.';
        const index = await fetchJson(basePath + '/data/weeks/index.json');
        WEEKS.push(...index.weeks.sort().reverse());
      } catch (e) {
        console.warn('Weeks index missing (ok for live-only deployments):', e.message);
      }
    }

    async function loadWeekData(weekId) {
      const basePath = window.location.pathname.includes('/weeks') ? '../..' : '.';
      return await fetchJson(basePath + `/data/weeks/${weekId}.json`);
    }

    async function renderCharts() {
      if (!WEEKS.length) {
        // Keep empty charts area but avoid crashing
        return;
      }

      const allData = await Promise.all(WEEKS.map(w => loadWeekData(w)));
      const labels = allData.map(d => d.week.replace('2026-W', 'W'));

      const velocities = allData.map(d => {
        const agents = d.agents;
        return Object.values(agents).reduce((s, a) => s + (a.stats.tasks_completed || a.stats.audits_completed || 0), 0);
      });

      const qualities = allData.map(d => d.ceo.trends?.quality_score || d.agents.curry?.stats?.quality_score || 0);

      const chartDefaults = {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8b99', font: { size: 12 } } },
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8b99', font: { size: 12 } }, beginAtZero: true }
        }
      };

      new Chart(document.getElementById('velocityChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Tasks',
            data: velocities,
            borderColor: '#8b5cf6',
            backgroundColor: 'rgba(139,92,246,0.1)',
            fill: true,
            tension: 0.3,
            pointBackgroundColor: '#8b5cf6',
            pointRadius: 5,
            pointHoverRadius: 7
          }]
        },
        options: chartDefaults
      });

      new Chart(document.getElementById('qualityChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Score',
            data: qualities,
            backgroundColor: qualities.map(q => q >= 8 ? 'rgba(34,197,94,0.6)' : q >= 6 ? 'rgba(234,179,8,0.6)' : 'rgba(239,68,68,0.6)'),
            borderColor: qualities.map(q => q >= 8 ? '#22c55e' : q >= 6 ? '#eab308' : '#ef4444'),
            borderWidth: 1,
            borderRadius: 6
          }]
        },
        options: { ...chartDefaults, scales: { ...chartDefaults.scales, y: { ...chartDefaults.scales.y, max: 10 } } }
      });
    }

    // --------- boot + polling integration ---------
    document.addEventListener('DOMContentLoaded', async () => {
      // Charts are independent from live polling
      await loadWeeksIndex();
      await renderCharts();

      // Initial render (after app.js loads once)
      setTimeout(() => {
        const live = window.DreamteamLive?.getState?.().data;
        if (live) resetAndRenderAll(live);
      }, 180);

      // Every 2s: refresh UI from current polled data (cheap, no network)
      setInterval(() => {
        const st = window.DreamteamLive?.getState?.();
        if (!st || !st.data) return;
        renderAgentsStrip(st.data.agents || {});
        renderKPIGrid(calcKPIs(st.data));
        renderFeed(st.data.feed || []);
        document.getElementById('demoBadge').style.display = (st.source === 'demo') ? 'inline-flex' : 'none';
      }, 2000);

      // Tabs (instant switch; no reload)
      const tabButtons = Array.from(document.querySelectorAll('.tab'));
      const panels = {
        atwork: document.getElementById('tab-atwork'),
        retro: document.getElementById('tab-retro')
      };

      function setActiveTab(key) {
        for (const b of tabButtons) {
          const is = b.dataset.tab === key;
          b.classList.toggle('active', is);
          b.setAttribute('aria-selected', is ? 'true' : 'false');
        }
        for (const [k, el] of Object.entries(panels)) {
          if (!el) continue;
          el.classList.toggle('active', k === key);
        }
      }

      for (const b of tabButtons) {
        b.addEventListener('click', () => setActiveTab(b.dataset.tab));
      }

      setActiveTab('atwork');

      // Show more
      document.getElementById('showMoreBtn').addEventListener('click', () => {
        visibleCount = Math.min(visibleCount + 30, 120);
        const st = window.DreamteamLive?.getState?.();
        if (st?.data?.feed) {
          renderFeed(st.data.feed, { reset: true });
        }
      });
    });
  </script>
</body>
</html>
